<!DOCTYPE html>
<html>
<head>
<title>{{name}}</title>
</head>
<body>

<h1>{{name}}</h1>

<p>{{quiz.question}}</p>

<form method="post">

<input type="radio" name="answer" value="a"> {{quiz.a}} <br>
<input type="radio" name="answer" value="b"> {{quiz.b}} <br>
<input type="radio" name="answer" value="c"> {{quiz.c}} <br><br>

<button type="submit">Antwort prüfen</button>

</form>

{% if result %}
<h2>{{result}}</h2>
{% endif %}

<br>
<a href="/">Zurück</a>

</body>
</html>
